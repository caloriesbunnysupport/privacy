<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #fffdf8 0%, #fff7ef 100%);
      color: #1f2937;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
      border: 1px solid #f3e8d8;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #fff2df;
      color: #9a5b12;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.15;
    }

    p {
      margin: 14px 0 0;
      font-size: 16px;
      line-height: 1.6;
      color: #6b7280;
    }

    .button-group {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      cursor: pointer;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }

    .button-primary {
      background: #111827;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.18);
    }

    .button-secondary {
      background: #fff7ef;
      color: #8b5a2b;
      border: 1px solid #f3dfc5;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 20px;
        border-radius: 20px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Legal</div>
    <h1>Legal Information</h1>
    <p>
      Please choose a document below to view our legal information.
    </p>

    <div class="button-group">
      <a class="button button-primary" href="./privacy_policy.txt">Privacy Policy</a>
      <a class="button button-secondary" href="./terms.html">Terms of Use</a>
    </div>

    <div class="footer">
      © 2026 Your App Name. All rights reserved.
    </div>
  </main>
</body>
</html>
